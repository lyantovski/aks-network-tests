# =============================================================================
# webhook-app.yaml – Sample "webhook" application
# =============================================================================
# This manifest is shared by both clusters (kubenet and Azure CNI pod-subnet).
#
# Scheduling enforcement:
#   nodeSelector  → targets nodes in the "webhook" nodepool (label role=webhook)
#   tolerations   → allows scheduling on nodes tainted webhook=true:NoSchedule
#
# The combination of nodeSelector + taint/toleration means:
#   • The webhook pods will ONLY land on the webhook nodepool nodes.
#   • No other workload (without the toleration) can land on those nodes.
# =============================================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: webhook
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook
  namespace: webhook
  labels:
    app: webhook
spec:
  replicas: 3
  selector:
    matchLabels:
      app: webhook
  template:
    metadata:
      labels:
        app: webhook
    spec:
      # ── Scheduling: target the webhook nodepool ─────────────────────────────
      nodeSelector:
        role: webhook          # matches --node-labels "role=webhook" on the nodepool

      tolerations:
        - key: "webhook"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule" # matches --node-taints "webhook=true:NoSchedule"

      # ── Pod anti-affinity: spread across nodes for resilience ───────────────
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - webhook
                topologyKey: kubernetes.io/hostname

      containers:
        - name: webhook
          # curlimages/curl: lightweight Alpine-based image with curl.
          # Runs as non-root (uid 100). Used for egress verification via kubectl exec.
          image: curlimages/curl:latest
          command: ["sh", "-c", "while true; do sleep 60; done"]
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 100
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true

      securityContext:
        seccompProfile:
          type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: webhook
  namespace: webhook
  labels:
    app: webhook
spec:
  selector:
    app: webhook
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
---
